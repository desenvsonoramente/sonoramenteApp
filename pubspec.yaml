name: sonoramente
description: "Um aplicativo de cuidado emocional em áudio."
publish_to: 'none'

version: 1.0.46+47

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # ✅ Versão do app (USADO EM RUNTIME)
  package_info_plus: ^8.3.1

  # Básicos
  http: ^1.2.0
  provider: ^6.1.2
  intl: ^0.19.0
  image_picker: ^1.0.7

  # Áudio
  just_audio: ^0.9.36
  audioplayers: ^6.0.0

  # Firebase (VERSÕES COMPATÍVEIS ENTRE SI)
  firebase_core: ^2.32.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.7.7
  cloud_functions: ^4.6.5
  firebase_app_check: ^0.2.2+7
  firebase_installations: ^16.3.6
  secure_application: ^4.1.0

  # Login com Google
  google_sign_in: ^6.2.1

  # Segurança
  screen_protector: ^1.4.2

  # Ícones iOS
  cupertino_icons: ^1.0.8

  # Links externos
  url_launcher: ^6.2.5

  # Compras no app
  in_app_purchase: ^3.1.11

  # 📱 Device info (USADO EM RUNTIME)
  device_info_plus: ^10.1.0

  # 💾 Storage local (USADO EM RUNTIME)
  shared_preferences: ^2.2.3

  # 🔑 UUID (USADO EM RUNTIME)
  uuid: ^4.4.2

  # ✅ Installer (Play Store vs sideload) - diagnóstico
  installer_info: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png